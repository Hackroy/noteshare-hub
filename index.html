<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NoteShare Hub - Student Notes Sharing</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        :root { --primary: #6366f1; --secondary: #8b5cf6; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; }
        .note-card { transition: all 0.3s; border: none; box-shadow: 0 4px 20px rgba(0,0,0,0.1); }
        .note-card:hover { transform: translateY(-5px); box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .upload-area { border: 3px dashed var(--primary); transition: all 0.3s; }
        .upload-area:hover, .upload-area.dragover { background: var(--primary); color: white; }
    </style>
</head>
<body>
    <!-- Navigation -->
    <nav class="navbar navbar-expand-lg navbar-dark bg-transparent">
        <div class="container">
            <a class="navbar-brand fw-bold fs-3" href="#"><i class="fas fa-file-alt me-2"></i>NoteShare Hub</a>
            <div class="navbar-nav ms-auto" id="navLinks">
                <a class="nav-link" href="#home">Home</a>
                <a class="nav-link" href="#upload">Upload</a>
                <a class="nav-link" href="#notes">Notes</a>
                <span class="navbar-text me-3" id="userInfo">Guest</span>
                <button class="btn btn-outline-light" id="loginBtn">Login</button>
            </div>
        </div>
    </nav>

    <!-- Hero Section -->
    <section id="home" class="container py-5 text-center text-white">
        <h1 class="display-4 fw-bold mb-4">Your Notes, Shared Smartly</h1>
        <p class="lead mb-4">Upload, tag, search & collaborate on lecture notes instantly</p>
        <div class="row justify-content-center">
            <div class="col-md-3">
                <div class="card bg-transparent border-0 text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-upload fa-3x mb-3 text-primary"></i>
                        <h5>Upload Notes</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-transparent border-0 text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-search fa-3x mb-3 text-primary"></i>
                        <h5>Smart Search</h5>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card bg-transparent border-0 text-white">
                    <div class="card-body text-center">
                        <i class="fas fa-share fa-3x mb-3 text-primary"></i>
                        <h5>Share Instantly</h5>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Upload Section -->
    <section id="upload" class="container-fluid py-5 bg-white">
        <div class="row justify-content-center">
            <div class="col-lg-8">
                <div class="card shadow-lg">
                    <div class="card-header bg-primary text-white text-center">
                        <h3><i class="fas fa-cloud-upload-alt me-2"></i>Upload New Note</h3>
                    </div>
                    <div class="card-body">
                        <form id="uploadForm">
                            <div class="mb-3">
                                <label class="form-label fw-bold">Title</label>
                                <input type="text" class="form-control" id="noteTitle" required>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Subject</label>
                                <select class="form-select" id="subject">
                                    <option>Mathematics</option>
                                    <option>Physics</option>
                                    <option>Chemistry</option>
                                    <option>Computer Science</option>
                                    <option>Biology</option>
                                    <option>English</option>
                                    <option>Other</option>
                                </select>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Tags (comma separated)</label>
                                <input type="text" class="form-control" id="tags" placeholder="calculus, sem3, important">
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Content</label>
                                <textarea class="form-control" id="content" rows="6" placeholder="Paste your notes here..."></textarea>
                            </div>
                            <div class="mb-3">
                                <label class="form-label fw-bold">Upload File (PDF/DOC)</label>
                                <div class="upload-area p-4 text-center rounded" id="fileDrop">
                                    <i class="fas fa-cloud-upload-alt fa-3x mb-3"></i>
                                    <p>Drag & drop or click to browse</p>
                                    <input type="file" class="form-control" id="noteFile" accept=".pdf,.doc,.docx,.txt">
                                </div>
                            </div>
                            <button type="submit" class="btn btn-primary btn-lg w-100">
                                <i class="fas fa-paper-plane me-2"></i>Share Note
                            </button>
                        </form>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <!-- Notes Section -->
    <section id="notes" class="container py-5">
        <div class="row mb-4">
            <div class="col-md-6">
                <h2 class="mb-3">📚 Featured Notes</h2>
            </div>
            <div class="col-md-6">
                <div class="input-group">
                    <input type="text" class="form-control" id="searchInput" placeholder="Search notes by title/tags...">
                    <button class="btn btn-primary" id="searchBtn"><i class="fas fa-search"></i></button>
                </div>
            </div>
        </div>
        <div id="notesContainer" class="row">
            <!-- Notes will load here -->
        </div>
    </section>

    <!-- Login Modal -->
    <div class="modal fade" id="loginModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h5 class="modal-title"><i class="fas fa-user me-2"></i>Login / Register</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="authForm">
                        <div class="mb-3">
                            <input type="email" class="form-control" id="userEmail" placeholder="Email" required>
                        </div>
                        <div class="mb-3">
                            <input type="text" class="form-control" id="userName" placeholder="Name" required>
                        </div>
                        <div class="mb-3">
                            <input type="password" class="form-control" id="userPassword" placeholder="Password">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">Enter NoteShare</button>
                    </form>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // Sample notes data (in real app, this comes from backend)
        let notes = [
            {id:1, title:"Calculus Midterm Notes", subject:"Mathematics", tags:"calculus,derivatives,midterm", likes:25, downloads:120, user:"Rahul Sharma"},
            {id:2, title:"Python OOP Concepts", subject:"Computer Science", tags:"python,oop,classes", likes:42, downloads:89, user:"Priya Singh"},
            {id:3, title:"Organic Chemistry Reactions", subject:"Chemistry", tags:"organic,reactions,mechanisms", likes:18, downloads:67, user:"Amit Patel"}
        ];
        let currentUser = null;

        // Initialize
        document.addEventListener('DOMContentLoaded', function() {
            loadNotes();
            initEventListeners();
        });

        function initEventListeners() {
            // Navigation
            document.querySelectorAll('a[href^="#"]').forEach(anchor => {
                anchor.addEventListener('click', function (e) {
                    e.preventDefault();
                    document.querySelector(this.getAttribute('href')).scrollIntoView({ behavior: 'smooth' });
                });
            });

            // Login modal
            document.getElementById('loginBtn').addEventListener('click', () => {
                new bootstrap.Modal(document.getElementById('loginModal')).show();
            });

            // Auth form
            document.getElementById('authForm').addEventListener('submit', handleAuth);
            document.getElementById('uploadForm').addEventListener('submit', handleUpload);
            
            // Search
            document.getElementById('searchBtn').addEventListener('click', searchNotes);
            document.getElementById('searchInput').addEventListener('keypress', function(e) {
                if(e.key === 'Enter') searchNotes();
            });

            // File upload
            const fileInput = document.getElementById('noteFile');
            const dropArea = document.getElementById('fileDrop');
            
            dropArea.addEventListener('click', () => fileInput.click());
            dropArea.addEventListener('dragover', handleDragOver);
            dropArea.addEventListener('dragleave', handleDragLeave);
            dropArea.addEventListener('drop', handleDrop);
            fileInput.addEventListener('change', handleFileSelect);
        }

        function handleAuth(e) {
            e.preventDefault();
            const email = document.getElementById('userEmail').value;
            const name = document.getElementById('userName').value;
            currentUser = {name, email};
            document.getElementById('userInfo').textContent = `Welcome, ${name}!`;
            document.getElementById('navLinks').innerHTML = `
                <a class="nav-link" href="#upload">Upload</a>
                <a class="nav-link" href="#notes">Notes</a>
                <span class="navbar-text me-3">${name}</span>
                <button class="btn btn-outline-light" id="logoutBtn">Logout</button>
            `;
            bootstrap.Modal.getInstance(document.getElementById('loginModal')).hide();
            document.getElementById('logoutBtn').addEventListener('click', () => {
                currentUser = null;
                document.getElementById('userInfo').textContent = 'Guest';
                location.reload();
            });
        }

        function handleUpload(e) {
            e.preventDefault();
            if(!currentUser) {
                alert('Please login first!');
                return;
            }
            
            const note = {
                id: Date.now(),
                title: document.getElementById('noteTitle').value,
                subject: document.getElementById('subject').value,
                tags: document.getElementById('tags').value,
                content: document.getElementById('content').value,
                likes: 0,
                downloads: 0,
                user: currentUser.name
            };
            
            notes.unshift(note);
            loadNotes();
            document.getElementById('uploadForm').reset();
            alert('✅ Note uploaded successfully!');
        }

        function loadNotes(filteredNotes = notes) {
            const container = document.getElementById('notesContainer');
            container.innerHTML = filteredNotes.map(note => `
                <div class="col-lg-4 col-md-6 mb-4">
                    <div class="card note-card h-100">
                        <div class="card-body">
                            <h5 class="card-title">${note.title}</h5>
                            <p class="text-muted small mb-2">
                                <i class="fas fa-tag me-1"></i>${note.subject} • ${note.tags}
                            </p>
                            <p class="card-text">${note.content.substring(0, 100)}...</p>
                            <div class="d-flex justify-content-between align-items-center mb-2">
                                <small class="text-muted">by ${note.user}</small>
                                <div>
                                    <i class="fas fa-thumbs-up text-primary me-1" data-id="${note.id}"></i>
                                    <span class="likes">${note.likes}</span>
                                    <i class="fas fa-download ms-2 text-success me-1" data-id="${note.id}"></i>
                                    <span class="downloads">${note.downloads}</span>
                                </div>
                            </div>
                        </div>
                        <div class="card-footer bg-transparent border-0">
                            <a href="#" class="btn btn-outline-primary btn-sm" data-id="${note.id}">
                                <i class="fas fa-eye me-1"></i>View Full
                            </a>
                            <a href="#" class="btn btn-success btn-sm ms-2" data-id="${note.id}">
                                <i class="fas fa-download me-1"></i>Download
                            </a>
                        </div>
                    </div>
                </div>
            `).join('');

            // Add event listeners to new elements
            container.querySelectorAll('[data-id]').forEach(el => {
                el.addEventListener('click', function(e) {
                    e.preventDefault();
                    const id = parseInt(this.dataset.id);
                    const note = notes.find(n => n.id === id);
                    if(this.querySelector('.fa-thumbs-up')) {
                        note.likes++;
                        loadNotes();
                    } else if(this.querySelector('.fa-download')) {
                        note.downloads++;
                        loadNotes();
                        alert('📥 Downloaded! (Demo)');
                    }
                });
            });
        }

        function searchNotes() {
            const query = document.getElementById('searchInput').value.toLowerCase();
            const filtered = notes.filter(note => 
                note.title.toLowerCase().includes(query) ||
                note.tags.toLowerCase().includes(query) ||
                note.subject.toLowerCase().includes(query)
            );
            loadNotes(filtered);
        }

        // File upload handlers
        function handleDragOver(e) {
            e.preventDefault();
            e.currentTarget.classList.add('dragover');
        }
        function handleDragLeave(e) {
            e.currentTarget.classList.remove('dragover');
        }
        function handleDrop(e) {
            e.preventDefault();
            e.currentTarget.classList.remove('dragover');
            document.getElementById('noteFile').files = e.dataTransfer.files;
        }
        function handleFileSelect(e) {
            const fileName = e.target.files[0]?.name || '';
            document.getElementById('fileDrop').innerHTML = `
                <i class="fas fa-file fa-2x mb-2 text-success"></i>
                <p>${fileName}</p>
            `;
        }
    </script>
</body>
</html>
